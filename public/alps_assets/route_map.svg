<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- allow-curves -->
  <!-- Background -->
  <rect x="0" y="0" width="800" height="300" fill="#F5F0E8"/>

  <!-- Subtle hand-drawn frame -->
  <path d="M 18 16 Q 400 12 782 18 Q 786 150 780 284 Q 400 288 20 282 Q 14 150 18 16 Z"
        fill="none" stroke="#C9A96E" stroke-width="0.8" stroke-dasharray="2,4" opacity="0.45"/>

  <!-- Title -->
  <text x="40" y="44" font-family="sans-serif" font-size="13" fill="#5C3D2E" letter-spacing="3">ALPS · 15 DAYS</text>
  <text x="40" y="64" font-family="sans-serif" font-size="18" font-style="italic" fill="#1f2329">法意瑞阿尔卑斯巅峰之旅</text>
  <line x1="40" y1="74" x2="170" y2="76" stroke="#C9A96E" stroke-width="1.2"/>

  <!-- Country tags (faint) -->
  <text x="110" y="108" font-family="sans-serif" font-size="9" fill="#8f959e" letter-spacing="2">FRANCE</text>
  <text x="310" y="108" font-family="sans-serif" font-size="9" fill="#8f959e" letter-spacing="2">ITALY</text>
  <text x="500" y="108" font-family="sans-serif" font-size="9" fill="#8f959e" letter-spacing="2">SWITZERLAND</text>
  <text x="680" y="108" font-family="sans-serif" font-size="9" fill="#8f959e" letter-spacing="2">SWITZERLAND</text>

  <!-- Hand-drawn dashed route -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#C9A96E"/>
    </marker>
  </defs>

  <!-- Main wavy route, four segments -->
  <path d="M 130 175
           Q 200 130 260 170
           Q 305 200 340 175
           T 430 178
           Q 480 150 540 175
           Q 580 195 620 172
           T 720 175"
        fill="none" stroke="#C9A96E" stroke-width="2"
        stroke-dasharray="6,5" stroke-linecap="round"
        marker-end="url(#arrow)"/>

  <!-- Light parallel shadow line to imitate hand drawing -->
  <path d="M 130 178
           Q 200 134 260 173
           Q 305 203 340 178
           T 430 181
           Q 480 153 540 178
           Q 580 198 620 175
           T 720 178"
        fill="none" stroke="#5C3D2E" stroke-width="0.5" opacity="0.25"/>

  <!-- Node 1: CHAMONIX -->
  <g>
    <polyline points="115,180 128,158 138,170 150,150 162,178" fill="none" stroke="#5C3D2E" stroke-width="1.4" stroke-linejoin="round"/>
    <line x1="115" y1="180" x2="162" y2="180" stroke="#5C3D2E" stroke-width="1"/>
    <circle cx="138" cy="180" r="3.2" fill="#C9A96E" stroke="#5C3D2E" stroke-width="0.8"/>
    <text x="138" y="215" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1f2329" text-anchor="middle" letter-spacing="2">CHAMONIX</text>
    <text x="138" y="232" font-family="sans-serif" font-size="11" fill="#5C3D2E" text-anchor="middle">霞慕尼</text>
    <text x="138" y="248" font-family="sans-serif" font-size="9" fill="#8f959e" text-anchor="middle">Day 1–4</text>
  </g>

  <!-- Node 2: DOLOMITES -->
  <g>
    <polyline points="305,180 320,148 332,168 346,142 358,172 370,180" fill="none" stroke="#5C3D2E" stroke-width="1.4" stroke-linejoin="round"/>
    <line x1="305" y1="180" x2="370" y2="180" stroke="#5C3D2E" stroke-width="1"/>
    <circle cx="338" cy="180" r="3.2" fill="#C9A96E" stroke="#5C3D2E" stroke-width="0.8"/>
    <text x="338" y="215" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1f2329" text-anchor="middle" letter-spacing="2">DOLOMITES</text>
    <text x="338" y="232" font-family="sans-serif" font-size="11" fill="#5C3D2E" text-anchor="middle">多洛米蒂</text>
    <text x="338" y="248" font-family="sans-serif" font-size="9" fill="#8f959e" text-anchor="middle">Day 5–8</text>
  </g>

  <!-- Node 3: ZERMATT -->
  <g>
    <polyline points="505,180 520,150 530,165 545,135 558,170 572,180" fill="none" stroke="#5C3D2E" stroke-width="1.4" stroke-linejoin="round"/>
    <line x1="505" y1="180" x2="572" y2="180" stroke="#5C3D2E" stroke-width="1"/>
    <circle cx="540" cy="180" r="3.2" fill="#C9A96E" stroke="#5C3D2E" stroke-width="0.8"/>
    <text x="540" y="215" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1f2329" text-anchor="middle" letter-spacing="2">ZERMATT</text>
    <text x="540" y="232" font-family="sans-serif" font-size="11" fill="#5C3D2E" text-anchor="middle">采尔马特</text>
    <text x="540" y="248" font-family="sans-serif" font-size="9" fill="#8f959e" text-anchor="middle">Day 9–11</text>
  </g>

  <!-- Node 4: GRINDELWALD -->
  <g>
    <polyline points="685,180 700,156 712,170 725,148 740,178" fill="none" stroke="#5C3D2E" stroke-width="1.4" stroke-linejoin="round"/>
    <line x1="685" y1="180" x2="740" y2="180" stroke="#5C3D2E" stroke-width="1"/>
    <circle cx="712" cy="180" r="3.2" fill="#C9A96E" stroke="#5C3D2E" stroke-width="0.8"/>
    <text x="712" y="215" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1f2329" text-anchor="middle" letter-spacing="2">GRINDELWALD</text>
    <text x="712" y="232" font-family="sans-serif" font-size="11" fill="#5C3D2E" text-anchor="middle">格林德瓦</text>
    <text x="712" y="248" font-family="sans-serif" font-size="9" fill="#8f959e" text-anchor="middle">Day 12–15</text>
  </g>

  <!-- Small compass mark -->
  <g opacity="0.55">
    <circle cx="755" cy="50" r="14" fill="none" stroke="#5C3D2E" stroke-width="0.8"/>
    <polygon points="755,38 758,50 755,62 752,50" fill="#C9A96E" stroke="#5C3D2E" stroke-width="0.5"/>
    <text x="755" y="33" font-family="sans-serif" font-size="8" fill="#5C3D2E" text-anchor="middle">N</text>
  </g>
</svg>